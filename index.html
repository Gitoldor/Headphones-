<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Viewer | Sho1re1</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {font-family: 'Poppins', sans-serif; padding: 20px; background: #fafafa;}
    h1 {text-align: center;}
    .product-list {display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 20px;}
    .card {background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
    .price {color: #007bff; font-weight: 600;}
  </style>
</head>
<body>
  <h1>🛒 Products</h1>
  <div class="product-list" id="productList"></div>

  <script src="indexdb.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const products = await readAllProducts();
      const container = document.getElementById("productList");
      container.innerHTML = products.map(p => `
        <div class="card">
          <h3>${p.name}</h3>
          <p>${p.description}</p>
          <p class="price">₹${p.price}</p>
        </div>
      `).join("");
    });
  </script>
</body>
</html>
